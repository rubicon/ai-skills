name: release-please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Load release-please App credentials from 1Password
        id: op
        uses: 1password/load-secrets-action@v4
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RP_APP_ID: "op://Automation/rubicon-release-please-private-key/app id"
          RP_PRIVATE_KEY: "op://Automation/rubicon-release-please-private-key/private key"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.op.outputs.RP_APP_ID }}
          private-key: ${{ steps.op.outputs.RP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
